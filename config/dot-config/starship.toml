# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# LEFT PROMPT: OS icon, directory, and character on single line
format = """$os$directory$character"""

# RIGHT PROMPT: Rainbow of extra info (git, python, pulumi, kubernetes, aws)
# Uses left-pointing powerline arrows for right-side aesthetic
right_format = """\
[î‚¶](cyan)\
$git_branch\
$git_commit\
$git_status\
[î‚°](fg:cyan bg:green)\
$python\
[î‚°](fg:green bg:purple)\
$pulumi\
[î‚°](fg:purple bg:blue)\
$kubernetes\
[î‚°](fg:blue bg:red)\
$aws\
[î‚°](fg:red)\
"""

# LEFT SIDE MODULES
[os]
disabled = false
style = "fg:bright-white"
format = "[$symbol ]($style)"

[os.symbols]
Windows = "َ°چ²"
Ubuntu = "َ°•ˆ"
Macos = "َ°€µ"
Linux = "َ°Œ½"
Fedora = "َ°£›"
Arch = "َ°£‡"
CachyOS = "َ°£‡"
Pop = ""

[directory]
format = "[$path ]($style)"
style = "fg:cyan"
truncation_length = 3
truncation_symbol = ".../"

[character]
success_symbol = '[َ°ک§](bold green)'
error_symbol = '[َ°ک§](bold fg:red)'
vimcmd_symbol = '[](bold fg:green)'
vimcmd_replace_one_symbol = '[](bold fg:purple)'
vimcmd_replace_symbol = '[](bold fg:purple)'
vimcmd_visual_symbol = '[َ°°«](bold fg:yellow)'

# RIGHT SIDE MODULES (rainbow segments)
[git_branch]
symbol = ""
style = "bg:cyan"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:cyan"
format = '[$all_status$ahead_behind ]($style)'
ignore_submodules = true

[python]
style = "bg:green"
symbol = ""
format = '[[ $symbol( $version) ](fg:bright-white bg:green)]($style)'

[kubernetes]
disabled = false
style = "bg:blue"
format = '[ $symbol$context(\($namespace\)) ]($style)'

[pulumi]
style = "bg:purple"
format = '[ $symbol($username@)$stack ]($style)'

[aws]
format = '[ $symbol($profile )(\($region\)) ]($style)'
style = 'bg:red'
symbol = 'ًں…° '

[username]
show_always = false
style_user = "bg:green"
style_root = "bg:green"
format = '[ $user ]($style)'
disabled = true

[hostname]
ssh_only = true
ssh_symbol = ''
format = '[on $ssh_symbol$hostname](green)'
trim_at = '.'
disabled = false
